  prompt_text: "\"You are an assistant who answers the question only based on given\
    \ knowledge as truthfully as possible. I want you to Answer the question based\
    \ on the given Knowledge.\n\nKnowledge:\nKopi luwak, also known as civet coffee,\
    \ is a coffee that consists of partially digested coffee cherries, which have\
    \ been eaten and defecated by the Asian palm civet (Paradoxurus hermaphroditus).\
    \ The cherries are fermented as they pass through a civet's intestines, and after\
    \ being defecated with other fecal matter, they are collected.[1] Asian palm civets\
    \ are increasingly caught in the wild and traded for this purpose.\n\nKopi luwak\
    \ is produced mainly on the Indonesian islands of Sumatra, Java, Bali, Sulawesi,\
    \ and in East Timor. It is also widely gathered in the forest or produced in farms\
    \ in the islands of the Philippines,[3] where the product is called kape motit\
    \ in the Cordillera region, kap\xE9 alam\xEDd in Tagalog areas, kap\xE9 mel\xF4\
    \ or kap\xE9 musang in Mindanao, and kahawa kubing in the Sulu Archipelago. 'NAME_1\
    \ coffee' is a loose English translation of its Vietnamese name c\xE0 ph\xEA Ch\u1ED3\
    n.\n\nProducers of the coffee beans argue that the process may improve coffee\
    \ through two mechanisms: selection, where civets choose to eat only certain cherries;\
    \ and digestion, where biological or chemical mechanisms in the animals' digestive\
    \ tracts alter the composition of the coffee cherries.\n\nThe traditional method\
    \ of collecting feces from wild Asian palm civets has given way to an intensive\
    \ farming method, in which the palm civets are kept in battery cages and are force-fed\
    \ the cherries. This method of production has raised ethical concerns about the\
    \ treatment of civets and the conditions they are made to live in, which include\
    \ isolation, poor diet, small cages, and a high mortality rate.\n\nAlthough kopi\
    \ luwak is a form of processing rather than a variety of coffee, it has been called\
    \ one of the most expensive coffees in the world, with retail prices reaching\
    \ US$100 per kilogram for farmed beans and US$1,300 per kilogram for wild-collected\
    \ beans.[7] Another epithet given to it is that it is NAME_2 of coffees.\n\nQuestion:\n\
    What is the cost of Kopi Luwak per kilogram\n\nAnswer:\"\n"

  generated_text: " does.\nYou have destroyed your opponent\u2019s base.\nThe game\
    \ ends if your opponent resigns or quits.\nEnd Game\nWhen game is ended, points\
    \ are counted for crystal and eggs.\nCrystal points strategy\nThe basic strategy\
    \ is to maximize your harvest.\n\u201CHealing crystal\u201D crystal is a win condition.\
    \ In order to obtain keys, use healing crystal to protect your ants.\nBase building\
    \ crystal is profitable at the end of the game, as long as it does not burn valuable\
    \ healing crystal.\n\nConsider only harvesting when your crystals give you 15-30\
    \ points per turn, depending on the average number of surviving ants.\nAnts strategy\n\
    Death order of ants\nThe game aims to destroy a player\u2019s egg chamber before\
    \ the Heavy Ant dies. If the Heavy Ant survives, it often means he was able to\
    \ rescue the egg chamber.\n\nBecause of this, the player whose Ordinary Ant dies\
    \ last will be the winner.\n\nEvery player will destroy his opponent\u2019s Egg\
    \ Chamber with his Heavy Ant.\nThe other ant type will protect the egg chamber\
    \ until the Heavy Ant counters the Ordinary Ant of the other player. Don\u2019\
    t destroy the Egg Chamber and let your Heavy Ant counter the Ordinary ant from\
    \ the other player unless your Ordinary Ant dies.\nDeployment strategy\nAt the\
    \ start of the game, you should focus on building a giant army of healing crystal.\n\
    Try to play in a way to maximize crystal contribution to all your ants. For example,\
    \ placing a BEACON in the middle of the way from your light or dark base to the\
    \ egg chamber.\nWhen deploying your Heavy Ant, aim to reach your Light or Dark\
    \ Base last. Your Light Base is the base closest to the Light House. Your Dark\
    \ Base is the base closest to the Dark House.\nAt the end of the game, be profitable.\
    \ Ensure ants you\u2019re spending crystal on will be survivable if saved, and\
    \ be prepared to execute any queued BUILD, WAIT, or ATTACK actions as the Ordinary\
    \ Ants die. With enough healing crystal left, your Heavy Ant should ensure the\
    \ Light House (last to use) will be demolished.\n Eggbreaker\nEggs are commonly\
    \ seen as the Holy Grail of Battle Royale stage: they are synergic with ramps\
    \ and mineral fields, unforgiving to lose, and usually grow into huge forces with\
    \ time.\n\nHowever, if not exhausted, freeze oozes therein can die off and become\
    \ corpses with the same overkill value as eggs.\n\nThe ability to selectively\

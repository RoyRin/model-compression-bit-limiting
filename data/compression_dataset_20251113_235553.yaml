    \ wouldn\u2019t be acceptable. Not any more, none of the scenarios would be acceptable\
    \ but one. It would be acceptable if the mechanism offered benefits greater than\
    \ its costs, and the principles behind the mechanism can be justified.\n\nThe\
    \ question then is what are the issues and the risks associated with the Voice\

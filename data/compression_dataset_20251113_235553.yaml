  prompt_text: "The amount of crystal harvested per turn is equal to the weakest link\
    \ in the chain. In other words, it is the smallest amount of ants from the cells\
    \ that make up the chain.\n\n\nHere, the blue player will harvest 4 crystal per\
    \ turn.\n\nIn games with multiple bases per player, the game will choose the best\
    \ chain to either one of your bases.\n\nThe harvesting chains work the same way\
    \ for the egg resource.\n\nHarvesting an egg cell will spawn as many ants as resources\
    \ havested. The ants will spawn on the player\u2019s base on the start of next\
    \ turn. In games with multiple bases per player, the extra ants will spawn on\
    \ each base, regardless of the base present in the harvest chain.\n\nHarvesting\
    \ is calculated separately for each resource, and for each one the game will automatically\
    \ choose the best chain from its cell to your base.\n\nAttack Chains\nA player\u2019\
    s harvest chains may be broken by their opponent\u2019s attack chains.\n\nWhen\
    \ computing harvest chains, some cells may have ants from both players. For each\
    \ of these cells, the attack chain of both players is computed, and if one of\
    \ the player has a lower value, this cell cannot be counted in the harvest chain.\n\
    \nThe attack chain value for a given cell is the weakest link in a chain from\
    \ that cell to one of the player\u2019s bases.\nExample\n\nThe attack chains for\
    \ the contested cell are: 5 for the red player and 3 for the blue player.\nThe\
    \ harvest chain is unbroken.\n\nThe attack chains for the contested cell are:\
    \ 5 for the red player and 8 for the blue player.\nThe harvest chain is broken.\n\
    Actions\nOn each turn players can do any amount of valid actions, which include:\n\
    \nBEACON index strength: place a beacon of strength strength on cell index.\n\
    LINE index1 index2 strength: place beacons all along a path from index1 to index2,\
    \ all of strength strength. A shortest path is chosen automatically.\nWAIT: do\
    \ nothing.\nMESSAGE text. Displays text on your side of the HUD.\nAction order\
    \ for one turn\nLINE actions are computed.\nBEACON actions are computed.\nAnts\
    \ move.\nEggs are harvested and new ants spawn.\nCrystal is harvested and points\
    \ are scored.\n\nNote: when two players harvest from the same resource, they will\
    \ both receive the full expected amount regardless of whether there is enough\
    \ resource to support it.\nVictory Conditions\nYou have harvested at least half\
    \ of the total crystal on the map before your opponent"
  prompt_token_length: 500

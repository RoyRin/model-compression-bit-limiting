  prompt: 'http://en.wikipedia.org/wiki/Main_Page #REDIRECT American Samoa #REDIRECT
    Applied ethics #REDIRECT Accessible_computing #REDIRECT Ada programming language
    /* Anarchist Communism */ too many brackets ''''''Anarchism'''''' originated as
    a term of abuse first used against early working class radicals including the
    Diggers of the English Revolution and the ''''sans-culottes'''' of the French
    Revolution.[http://uk.encarta.msn.com/encyclopedia_761568770/Anarchism.html] Whilst
    the term is still used in a pejorative way to describe ''''&quot;any act that
    used violent means to destroy the organization of society&quot;''''&lt;ref&gt;[http://www.cas.sc.edu/socy/faculty/deflem/zhistorintpolency.html
    History of International'
  generated_text: 'Police Cooperation], from the final protocols of the &quot;International
    Conference of Rome for the Social Defense Against Anarchists&quot;, 1898&lt;/ref&gt;,
    it has also been taken up as a positive label by self-defined anarchists. The
    word ''''''anarchism'''''' is derived from the Greek ''''&amp;#945;&amp;#957;&amp;#945;&amp;#961;&amp;#967;&amp;#943;&amp;#945;''''
    (&quot;without archons (ruler, chief, king)&quot;). Anarchism as a political philosophy,
    is the belief that ''''rulers'''' are unnecessary and should be abolished, although
    there are differing interpretations of what this means. Anarchism also refers
    to related social movements) that advocate the elimination of authoritarian institutions,
    particularly the state.&lt;ref&gt;[http://en.wikiquote.org/wiki/Definitions_of_anarchism
    Definitions of anarchism] on Wikiquote, accessed 2006&lt;/ref&gt; The word &quot;anarchy,&quot;
    as most anarchists use it, does not imply chaos, nihilism, or anomie, but rather
    a harmonious anti-authoritarian society. In place of what are regarded as authoritarian
    political structures and coercive economic institutions, anarchists advocate social
    relations based upon voluntary association of autonomous individuals, mutual aid,
    and self-governance. While anarchism is most easily defined by what it is against,
    anarchists also offer positive visions of what they believe to be a truly free
    society. However, ideas about how an anarchist society might work vary considerably,
    especially with respect to economics; there is also disagreement about how a free
    society might be brought about. == Origins and predecessors == Kropotkin, and
    others, argue that before recorded history, human society was organized on anarchist
    principles.&lt;ref&gt;Kropotkin, Peter. ''''&quot;Mutual Aid: A Factor of Evolution&quot;'''',
    1902.&lt;/ref&gt; Most anthropologists follow Kropotkin and Engels in believing
    that hunter-gatherer bands were egalitarian and lacked division of labour, accumulated
    wealth, or decreed law, and had equal access to resources.&lt;ref&gt;Engels, Freidrich.
    ''''&quot;[http://www.marxists.org/archive/marx/works/1884/origin-family/index.htm
    Origins of the Family, Private Property, and the State]&quot;'''', 1884.&lt;/ref&gt;
    Anarchists including the The Anarchy Organisation and Rothbard find anarchist
    attitudes in Taoism from Ancient China.&lt;ref&gt;The Anarchy Organization (Toronto).
    ''''Taoism and Anarchy.'''' April 14 2002 [http://www.toxicpop.co.uk/library/taoism.htm
    Toxicpop mirror] [http://www.geocities.com/SoHo/5705/taoan.html Vanity site mirror]&lt;/ref&gt;&lt;ref&gt;Rothbard,
    Murray.'
  max_new_tokens: 302

- prompt_id: 8
  prompt: It represents the utmost glorification of the theory and practice of the
    principle of authority.&quot; In France, where the fascists came close to insurrection
    in the February 1934 riots, anarchists divided over a 'united front' policy. [http://melior.univ-montp3.fr/ra_forum/en/people/berry_david/fascism_or_revolution.html]
    In Spain, the CNT initially refused to join a popular front electoral alliance,
    and abstention by CNT supporters led to a right wing election victory. But in
    1936, the CNT changed its policy and anarchist votes helped bring the popular
    front back to
  generated_text: 'power. Months later, the ruling class responded with an attempted
    coup, and the Spanish Civil War (1936-39) was underway. In reponse to the army
    rebellion an anarchist-inspired movement of peasants and workers, supported by
    armed militias, took control of the major city of Barcelona and of large areas
    of rural Spain where they collectivized the land. But even before the eventual
    fascist victory in 1939, the anarchists were losing ground in a bitter struggle
    with the Stalinists. The CNT leadership often appeared confused and divided, with
    some members controversially entering the government. Stalinist-led troops suppressed
    the collectives, and persecuted both dissident marxists and anarchists. Since
    the late 1970s anarchists have been involved in fighting the rise of neo-fascist
    groups. In Germany and the United Kingdom some anarchists worked within militant
    anti-fascist groups alongside members of the Marxist left. They advocated directly
    combating fascists with physical force rather than relying on the state. Since
    the late 1990s, a similar tendency has developed within US anarchism. ''''See
    also: Anti-Racist Action (US), Anti-Fascist Action (UK), Antifa'''' ==Religious
    anarchism== Most anarchist culture tends to be secular if not outright anti-religious.
    However, the combination of religious social conscience, historical religiousity
    amongst oppressed social classes, and the compatibility of some interpretations
    of religious traditions with anarchism has resulted in religious anarchism. Christian
    anarchists believe that there is no higher authority than God, and oppose earthly
    authority such as government and established churches. They believe that Jesus''
    teachings were clearly anarchistic, but were corrupted when &quot;Christianity&quot;
    was declared the official religion of Rome. Christian anarchists, who follow Jesus''
    directive to &quot;turn the other cheek&quot;, are strict pacifists. The most
    famous advocate of Christian anarchism was Leo Tolstoy, author of ''''The Kingdom
    of God is Within You'''', who called for a society based on compassion, nonviolent
    principles and freedom. Christian anarchists tend to form experimental communities.
    They also occasionally resist taxation. Many Christian anarchists are vegetarian
    or vegan.'
  max_new_tokens: 320
  source: enwiki9

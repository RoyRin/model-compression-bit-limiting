- prompt_id: 9
  prompt: Christian anarchy can be said to have roots as old as the religion's birth,
    as the early church exhibits many anarchistic tendencies, such as communal goods
    and wealth. By aiming to obey utterly certain of the Bible's teachings certain
    anabaptist groups of sixteenth century Europe attempted to emulate the early church's
    social-economic organisation and philosophy by regarding it as the only social
    structure capable of true obediance to Jesus' teachings, and utterly rejected
    (in theory) all earthly hierarchies
  generated_text: "and authority (and indeed non-anabaptists in general) and violence\
    \ as ungodly. Such groups, for example the Hutterites, typically went from initially\
    \ anarchistic beginnings to, as their movements stabalised, more authoritarian\
    \ social models. Chinese Anarchism was most influential in the 1920s. Strands\
    \ of Chinese anarchism included Tai-Xu's Buddhist Anarchism which was influenced\
    \ by Tolstoy and the well-field system. Neopaganism, with its focus on the environment\
    \ and equality, along with its often decentralized nature, has lead to a number\
    \ of neopagan anarchists. One of the most prominent is Starhawk, who writes extensively\
    \ about both spirituality and activism. ==Anarchism and feminism== Early French\
    \ feminists such as Jenny d'H\xE9ricourt and Juliette Adam criticised the mysogyny\

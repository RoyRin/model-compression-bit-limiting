- prompt_id: 6
  prompt: "The Industrial Workers of the World (IWW), founded in 1905 in the US, espoused\
    \ unionism and sought a general strike to usher in a stateless society. In 1923\
    \ 100,000 members existed, with the support of up to 300,000. Though not explicitly\
    \ anarchist, they organized by rank and file democracy, embodying a spirit of\
    \ resistance that has inspired many Anglophone syndicalists. Spanish anarchist\
    \ trade union federations were formed in the 1870's, 1900 and 1910. The most successful\
    \ was the Confederaci\xF3n"
  generated_text: "Nacional del Trabajo (National Confederation of Labour: CNT), founded\
    \ in 1910. Prior to the 1940s the CNT was the major force in Spanish working class\
    \ politics. With a membership of 1.58 million in 1934, the CNT played a major\
    \ role in the Spanish Civil War. ''See also:'' Anarchism in Spain. Syndicalists\
    \ like Ricardo Flores Mag\xF3n were key figures in the Mexican Revolution. Latin\
    \ American anarchism was strongly influenced, extending to the Zapatista rebellion\
    \ and the factory occupation movements in Argentina. In Berlin in 1922 the CNT\
    \ was joined with the International Workers Association, an anarcho-syndicalist\
    \ successor to the First International. Contemporary anarcho-syndicalism continues\
    \ as a minor force in many socities; much smaller than in the 1910s, 20s and 30s.\
    \ The largest organised anarchist movement today is in Spain, in the form of the\
    \ Confederaci\xF3n General del Trabajo and the CNT. The CGT claims a paid-up membership\
    \ of 60,000, and received over a million votes in Spanish syndical elections.\
    \ Other active syndicalist movements include the US Workers Solidarity Alliance,\
    \ and the UK Solidarity Federation. The revolutionary industrial unionist Industrial\
    \ Workers of the World also exists, claiming 2,000 paid members. Contemporary\
    \ critics of anarcho-syndicalism and revolutionary industrial unionism claim that\
    \ they are workerist and fail to deal with economic life outside work. Post-leftist\
    \ critics such as Bob Black claim anarcho-syndicalism advocates oppressive social\
    \ structures, such as work and the workplace. Anarcho-syndicalists in general\
    \ uphold principles of workers solidarity, direct action, and self-management.\
    \ ==The Russian Revolution== The Russian Revolution of 1917 was a seismic event\
    \ in the development of anarchism as a movement and as a philosophy. Anarchists\
    \ participated alongside the Bolsheviks in both February and October revolutions,\
    \ many anarchists initially supporting the Bolshevik coup. However the Bolsheviks\
    \ soon turned against the anarchists and other left-wing opposition, a conflict\
    \ which culminated in the 1918 Kronstadt rebellion. Anarchists in central Russia\
    \ were imprisoned or driven underground, or joined the victorious Bolsheviks."
  max_new_tokens: 317
  source: enwiki9
  chunk_id: 6
- prompt_id: 7
  prompt: In Ukraine anarchists fought in the civil war against both Whites and Bolsheviks
    within the Makhnovshchina peasant army led by Nestor Makhno). Expelled American
    anarchists Emma Goldman and Alexander Berkman before leaving Russia were amongst
    those agitating in response to Bolshevik policy and the suppression of the Kronstadt
    uprising. Both wrote classic accounts of their experiences in Russia, aiming to
    expose the reality of Bolshevik control. For them, Bakunin's predictions about
    the consequences of Marxist rule
  generated_text: 'had proved all too true. The victory of the Bolsheviks in the October
    Revolution and the resulting Russian Civil War did serious damage to anarchist
    movements internationally. Many workers and activists saw Bolshevik success as
    setting an example; Communist parties grew at the expense of anarchism and other
    socialist movements. In France and the US for example, the major syndicalist movements
    of the CGT and IWW began to realign themselves away from anarchism and towards
    the Communist International. In Paris, the Dielo Truda group of Russian anarchist
    exiles which included Nestor Makhno concluded that anarchists needed to develop
    new forms of organisation in response to the structures of Bolshevism. Their 1926
    manifesto, known as the Organisational Platform of the Libertarian Communists,
    was supported by some communist anarchists, though opposed by many others. The
    ''''Platform'''' continues to inspire some contemporary anarchist groups who believe
    in an anarchist movement organised around its principles of ''theoretical unity'',
    ''tactical unity'', ''collective responsibility'' and ''federalism''. Platformist
    groups today include the Workers Solidarity Movement in Ireland, the UK''s Anarchist
    Federation, and the late North Eastern Federation of Anarchist Communists in the
    northeastern United States and bordering Canada. ==The fight against fascism==
    , 1936. Members of the CNT construct armoured cars to fight against the fascists
    in one of the collectivised factories.]] In the 1920s and 1930s the familiar dynamics
    of anarchism''s conflict with the state were transformed by the rise of fascism
    in Europe. In many cases, European anarchists faced difficult choices - should
    they join in popular fronts with reformist democrats and Soviet-led Communists
    against a common fascist enemy? Luigi Fabbri, an exile from Italian fascism, was
    amongst those arguing that fascism was something different: :&quot;Fascism is
    not just another form of government which, like all others, uses violence. It
    is the most authoritarian and the most violent form of government imaginable.'
  max_new_tokens: 307
  source: enwiki9

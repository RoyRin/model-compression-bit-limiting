- prompt_id: 3
  prompt: ==American individualist anarchism== In 1825 Josiah Warren had participated
    in a communitarian experiment headed by Robert Owen called New Harmony, which
    failed in a few years amidst much internal conflict. Warren blamed the community's
    failure on a lack of individual sovereignty and a lack of private property. Warren
    proceeded to organise experimenal anarchist communities which respected what he
    called &quot;the sovereignty of the individual&quot; at Utopia and Modern Times.
    In 1833 Warren wrote and published ''The Peaceful
  generated_text: 'Revolutionist'''', which some have noted to be the first anarchist
    periodical ever published. Benjamin Tucker says that Warren &quot;was the first
    man to expound and formulate the doctrine now known as Anarchism.&quot; (''''Liberty''''
    XIV (December, 1900):1) Benjamin Tucker became interested in anarchism through
    meeting Josiah Warren and William B. Greene. He edited and published ''''Liberty''''
    from August 1881 to April 1908; it is widely considered to be the finest individualist-anarchist
    periodical ever issued in the English language. Tucker''s conception of individualist
    anarchism incorporated the ideas of a variety of theorists: Greene''s ideas on
    mutual banking; Warren''s ideas on cost as the limit of price (a heterodox variety
    of labour theory of value); Proudhon''s market anarchism; Max Stirner''s egoism;
    and, Herbert Spencer''s &quot;law of equal freedom&quot;. Tucker strongly supported
    the individual''s right to own the product of his or her labour as &quot;private
    property&quot;, and believed in a &lt;ref name=&quot;tucker-pay&quot;&gt;Tucker,
    Benjamin. ''''&quot;[http://www.blackcrayon.com/page.jsp/library/tucker/tucker37.htm
    Labor and Its Pay]&quot;'''' Individual Liberty: Selections From the Writings
    of Benjamin R. Tucker, Vanguard Press, New York, 1926, Kraus Reprint Co., Millwood,
    NY, 1973.&lt;/ref&gt;market economy for trading this property. He argued that
    in a truly free market system without the state, the abundance of competition
    would eliminate profits and ensure that all workers received the full value of
    their labor. Other 19th century individualists included Lysander Spooner, Stephen
    Pearl Andrews, and Victor Yarros. ==The First International== In Europe, harsh
    reaction followed the revolutions of 1848. Twenty years later in 1864 the International
    Workingmen''s Association, sometimes called the ''First International'', united
    some diverse European revolutionary currents including anarchism. Due to its genuine
    links to active workers movements the International became signficiant. From the
    start Karl Marx was a leading figure in the International: he was elected to every
    succeeding General Council of the association. The first objections to Marx came
    from the Mutualists who opposed communism and statism.'
  max_new_tokens: 309
  source: enwiki9
  chunk_id: 3
- prompt_id: 4
  prompt: Shortly after Mikhail Bakunin and his followers joined in 1868, the First
    International became polarised into two camps, with Marx and Bakunin as their
    respective figureheads. The clearest difference between the camps was over strategy.
    The anarchists around Bakunin favoured (in Kropotkin's words) &quot;direct economical
    struggle against capitalism, without interfering in the political parliamentary
    agitation.&quot; At that time Marx and his followers focused on parliamentary
    activity. Bakunin characterised Marx's ideas as authoritarian, and predicted that
    if
  generated_text: "a Marxist party gained to power its leaders would end up as bad\
    \ as the ruling class they had fought against.&lt;ref&gt;Bakunin, Mikhail. ''&quot;[http://www.litencyc.com/php/adpage.php?id=1969\
    \ Statism and Anarchy]&quot;''&lt;/ref&gt; In 1872 the conflict climaxed with\
    \ a final split between the two groups at the Hague Congress. This is often cited\
    \ as the origin of the conflict between anarchists and Marxists. From this moment\
    \ the ''social democratic'' and ''libertarian'' currents of socialism had distinct\
    \ organisations including rival 'internationals'. ==Anarchist Communism== Proudhon\
    \ and Bakunin both opposed communism, associating it with statism. However, in\
    \ the 1870s many anarchists moved away from Bakunin's economic thinking (called\
    \ &quot;collectivism&quot;) and embraced communist concepts. Communists believed\
    \ the means of production should be owned collectively, and that goods be distributed\
    \ by need, not labor. [http://nefac.net/node/157] An early anarchist communist\
    \ was Joseph D\xE9jacque, the first person to describe himself as &quot;libertarian&quot;.[http://recollectionbooks.com/bleed/Encyclopedia/DejacqueJoseph.htm]&lt;ref&gt;[http://joseph.dejacque.free.fr/ecrits/lettreapjp.htm\
    \ De l'\xEAtre-humain m\xE2le et femelle - Lettre \xE0 P.J. Proudhon par Joseph\
    \ D\xE9jacque] (in French)&lt;/ref&gt; Unlike Proudhon, he argued that &quot;it\
    \ is not the product of his or her labor that the worker has a right to, but to\
    \ the satisfaction of his or her needs, whatever may be their nature.&quot; He\
    \ announced his ideas in his US published journal Le Libertaire (1858-1861). Peter\
    \ Kropotkin, often seen as the most important theorist, outlined his economic\
    \ ideas in The Conquest of Bread and Fields, Factories and Workshops. He felt\
    \ co-operation is more beneficial than competition, illustrated in nature in Mutual\
    \ Aid: A Factor of Evolution (1897). Subsequent anarchist communists include Emma\
    \ Goldman and Alexander Berkman. Many in the anarcho-syndicalist movements (see\
    \ below) saw anarchist communism as their objective. Isaac Puente's 1932 Comunismo\
    \ Libertario was adopted by the Spanish CNT as its manifesto for a post-revolutionary\
    \ society. Some anarchists disliked merging communism with anarchism. Several\
    \ individualist anarchists maintained that abolition of private property was not\
    \ consistent with liberty."
  max_new_tokens: 305
  source: enwiki9
  chunk_id: 4
- prompt_id: 5
  prompt: For example, Benjamin Tucker, whilst professing respect for Kropotkin and
    publishing his work[http://www.zetetics.com/mac/libdebates/apx1pubs.html], described
    communist anarchism as &quot;pseudo-anarchism&quot;.&lt;ref name=&quot;tucker-pay&quot;/&gt;
    ==Propaganda of the deed== was an outspoken advocate of violence]] Anarchists
    have often been portrayed as dangerous and violent, due mainly to a number of
    high-profile violent acts, including riots, assassinations, insurrections, and
    terrorism by some anarchists. Some revolutionaries of the late 19th century encouraged
    acts of political violence, such as bombings and the assassinations of heads
  generated_text: "of state to further anarchism. Such actions have sometimes been\
    \ called 'propaganda by the deed'. One of the more outspoken advocates of this\
    \ strategy was Johann Most, who said &quot;the existing system will be quickest\
    \ and most radically overthrown by the annihilation of its exponents. Therefore,\
    \ massacres of the enemies of the people must be set in motion.&quot; Most's preferred\
    \ method of terrorism, dynamite, earned him the moniker &quot;Dynamost.&quot;\
    \ However, there is no consensus on the legitimacy or utility of violence in general.\
    \ Mikhail Bakunin and Errico Malatesta, for example, wrote of violence as a necessary\
    \ and sometimes desirable force in revolutionary settings. But at the same time,\
    \ they denounced acts of individual terrorism. (Malatesta in &quot;On Violence&quot;\
    \ and Bakunin when he refuted Nechaev). Other anarchists, sometimes identified\
    \ as pacifist anarchists, advocated complete nonviolence. Leo Tolstoy, whose philosophy\
    \ is often viewed as a form of Christian anarchism ''(see below)'', was a notable\
    \ exponent of nonviolent resistance. ==Anarchism in the labour movement== Anarcho-syndicalism\
    \ was an early 20th century working class movement seeking to overthrow capitalism\
    \ and the state to institute a worker controlled society. The movement pursued\
    \ industrial actions, such as general strike, as a primary strategy. Many anarcho-syndicalists\
    \ believed in anarchist communism, though not all communists believed in syndicalism.\
    \ After the 1871 repression French anarchism reemerged, influencing the ''Bourses\
    \ de Travails'' of autonomous workers groups and trade unions. From this movement\
    \ the Conf\xE9d\xE9ration G\xE9n\xE9rale du Travail (General Confederation of\
    \ Work, CGT) was formed in 1895 as the first major anarcho-syndicalist movement.\
    \ Emile Pataud and Emile Pouget's writing for the CGT saw libertarian communism\
    \ developing from a general strike. After 1914 the CGT moved away from anarcho-syndicalism\
    \ due to the appeal of Bolshevism. French-style syndicalism was a significant\
    \ movement in Europe prior to 1921, and remained a significant movement in Spain\
    \ until the mid 1940s."
  max_new_tokens: 304
  source: enwiki9

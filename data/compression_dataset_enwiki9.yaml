  prompt: The term is used to describe a person who is autistic and has extreme talent
    in a certain area of study. Although there is a common association between savants
    and autism (an association created by the 1988 film ''Rain Man''), most autistic
    people are not savants. Mental calculators and fast programming skills are the
    most common form. The famous example is Daniel Tammet, the subject of the documentary
    film ''The Brain Man'' (Kim Peek, one of the
  generated_text: inspirations for Dustin Hoffman's character in the film ''Rain Man'',
    is not autistic). &quot;Bright Splinters of the Mind&quot; is a book that explores
    this issue further. == Other pervasive developmental disorders == Autism and Asperger's
    syndrome are just two of the five pervasive developmental disorders (PDDs). The
    three other pervasive developmental disorders are Rett syndrome, Childhood disintegrative
    disorder, and Pervasive developmental disorder not otherwise specified. Some of
    these are related to autism, while some of them are entirely separate conditions.
    === Rett syndrome === Rett syndrome is relatively rare, affecting almost exclusively
    females, one out of 10,000 to 15,000. After a period of normal development, sometime
    between 6 and 18 months, autism-like symptoms begin to appear. The little girl's
    mental and social development regresses; she no longer responds to her parents
    and pulls away from any social contact. If she has been talking, she stops; she
    cannot control her feet; she wrings her hands. Some of these early symptoms may
    be confused for autism. Some of the problems associated with Rett syndrome can
    be treated. Physical, occupational, and speech therapy can help with problems
    of coordination, movement, and speech. Scientists sponsored by the National Institute
    of Child Health and Human Development have discovered that a mutation in the sequence
    of a single gene causes Rett syndrome, and can physically test for it with a 80%
    accuracy rate . Rett syndrome in the past was sometimes classified as an autistic
    spectrum disorder, however most scientists agree that Rett syndrome is a separate
    developmental disorder and not part of the autistic spectrum . ===Childhood disintegrative
    disorder=== Childhood disintegrative disorder (CDD, and sometimes abbreviated
    as CHDD also) is a condition appearing in 3 or 4 year old children who have developed
    normally until age 2. Over several months, the child will deteriorate in intellectual,
    social, and language functioning from previously normal behaviour.

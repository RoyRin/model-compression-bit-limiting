- prompt_id: 1
  prompt: '''''&quot;[http://www.lewrockwell.com/rothbard/ancient-chinese.html The
    Ancient Chinese Libertarian Tradition]&quot;'''', an extract from ''''&quot;[http://www.mises.org/journals/jls/9_2/9_2_3.pdf
    Concepts of the Role of Intellectuals in Social Change Toward Laissez Faire]&quot;'''',
    The Journal of Libertarian Studies, 9 (2) Fall 1990.&lt;/ref&gt; Kropotkin found

  prompt: 'It also depends on the angle of incidence of the radiation: unqualified,
    normal incidence. Fresh snow albedos are high: up to 90%. The ocean surface has
    a low albedo. The average albedo of Earth is about 30% whereas the albedo of the
    Moon is about 7%. In astronomy, the albedo of satellites and asteroids can be
    used to infer surface composition, most notably ice content. Enceladus, a moon
    of Saturn, has'
  generated_text: "the highest known albedo of any body in the solar system, with\
    \ 99% of EM radiation reflected. Human activities have changed the albedo (via\
    \ forest clearance and farming, for example) of various areas around the globe.\
    \ However, quantification of this effect is difficult on the global scale: it\
    \ is not clear whether the changes have tended to increase or decrease global\
    \ warming. The &quot;classical&quot; example of albedo effect is the snow-temperature\
    \ feedback. If a snow covered area warms and the snow melts, the albedo decreases,\
    \ more sunlight is absorbed, and the temperature tends to increase. The converse\
    \ is true: if snow forms, a cooling cycle happens. The intensity of the albedo\
    \ effect depends on the size of the change in albedo and the amount of insolation;\
    \ for this reason it can be potentially very large in the tropics. == Some examples\
    \ of albedo effects == === Fairbanks, Alaska === According to the National Climatic\
    \ Data Center's GHCN 2 data, which is composed of 30-year smoothed climatic means\
    \ for thousands of weather stations across the world, the college weather station\
    \ at Fairbanks, Alaska, is about 3 \xB0C (5 \xB0F) warmer than the airport at\
    \ Fairbanks, partly because of drainage patterns but also largely because of the\
    \ lower albedo at the college resulting from a higher concentration of pine trees\
    \ and therefore less open snowy ground to reflect the heat back into space. Neunke\
    \ and Kukla have shown that this difference is especially marked during the late\
    \ winter months, when solar radiation is greater. Although the albedo-temperature\
    \ effect is most famous in colder regions of Earth, because more snow falls there,\
    \ it is actually much stronger in tropical regions because in the tropics there\

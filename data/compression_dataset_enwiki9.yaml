    Anarchism], written by Peter Kropotkin, from Encyclopaedia Britannica, 1910]&lt;/ref&gt;
    The Anabaptists of 16th'
  generated_text: "century Europe are sometimes considered to be religious forerunners\
    \ of modern anarchism. Bertrand Russell, in his ''History of Western Philosophy'',\
    \ writes that the Anabaptists &quot;repudiated all law, since they held that the\
    \ good man will be guided at every moment by the Holy Spirit...[f]rom this premise\
    \ they arrive at communism....&quot;&lt;ref&gt;Russell, Bertrand. ''&quot;Ancient\
    \ philosophy&quot;'' in ''A History of Western Philosophy, and its connection\
    \ with political and social circumstances from the earliest times to the present\
    \ day'', 1945.&lt;/ref&gt; The Diggers or &quot;True Levellers&quot; were an early\
    \ communistic movement during the time of the English Civil War, and are considered\
    \ by some as forerunners of modern anarchism.&lt;ref&gt;[http://www.zpub.com/notes/aan-hist.html\
    \ An Anarchist Timeline], from Encyclopaedia Britannica, 1994.&lt;/ref&gt; In\
    \ the modern era, the first to use the term to mean something other than chaos\
    \ was Louis-Armand, Baron de Lahontan in his ''Nouveaux voyages dans l'Am\xE9\
    rique septentrionale'', (1703), where he described the indigenous American society,\
    \ which had no state, laws, prisons, priests, or private property, as being in\
    \ anarchy&lt;ref&gt;[http://etext.lib.virginia.edu/cgi-local/DHI/dhi.cgi?id=dv1-12\
    \ Dictionary of the History of Ideas - ANARCHISM]&lt;/ref&gt;. Russell Means,\
    \ a libertarian and leader in the American Indian Movement, has repeatedly stated\
    \ that he is &quot;an anarchist, and so are all [his] ancestors.&quot; In 1793,\
    \ in the thick of the French Revolution, William Godwin published ''An Enquiry\
    \ Concerning Political Justice'' [http://web.bilkent.edu.tr/Online/www.english.upenn.edu/jlynch/Frank/Godwin/pjtp.html].\
    \ Although Godwin did not use the word ''anarchism'', many later anarchists have\
    \ regarded this book as the first major anarchist text, and Godwin as the &quot;founder\
    \ of philosophical anarchism.&quot; But at this point no anarchist movement yet\
    \ existed, and the term ''anarchiste'' was known mainly as an insult hurled by\
    \ the bourgeois Girondins at more radical elements in the French revolution. ==The\
    \ first self-labelled anarchist== It is commonly held that it wasn't until Pierre-Joseph\
    \ Proudhon published ''What is Property?'' in 1840 that the term &quot;anarchist&quot;\
    \ was adopted as a self-description. It is for this reason that some claim Proudhon\
    \ as the founder of modern anarchist theory."

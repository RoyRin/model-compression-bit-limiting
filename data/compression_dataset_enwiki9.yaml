    that people with autism do not marry; many do get married. Often, they marry another
    person with autism, although this is not always the case. Many times autistics
    are attracted to other autistics due to shared interests or obsessions, but more
    often than not the attraction is due to simple compatibility with personality
  generated_text: types, the same as is true for non-autistics. Autistics who communicate
    have explained that companionship is as important to autistics as it is to anyone
    else. Multigenerational autistic families have also recently become a bit more
    common. The interests of autistic people and so-called &quot;geeks&quot; or &quot;nerds&quot;
    can often overlap as autistic people can sometimes become preoccupied with certain
    subjects, much like the variant normal behavior geeks experience. However, in
    practice many autistic people have difficulty with working in groups, which impairs
    them even in the most &quot;technical&quot; of situations. ===Autistic adults===
    thumb|right|Temple Grandin, one of the more successful adults with autism. &lt;small&gt;Photograph
    courtesy Joshua Nathaniel Pritikin and William Lawrence Jarrold.&lt;/small&gt;
    Some autistic adults are able to work successfully in mainstream jobs, usually
    those with high-functioning autism or Asperger's syndrome. Nevertheless, communication
    and social problems often cause difficulties in many areas of the autistic's life.
    Other autistics are capable of employment in sheltered workshops under the supervision
    of managers trained in working with persons with disabilities. A nurturing environment
    at home, at school, and later in job training and at work, helps autistic people
    continue to learn and to develop throughout their lives. Some argue that the internet
    allows autistic individuals to communicate and form online communities, in addition
    to being able to find occupations such as independent consulting, which does generally
    not require much human interaction offline. In the United States, the public schools'
    responsibility for providing services ends when the autistic person is in their
    20s, depending on each state. The family is then faced with the challenge of finding
    living arrangements and employment to match the particular needs of their adult
    child, as well as the programs and facilities that can provide support services
    to achieve these goals. === Autistic savants === The autistic savant phenomenon
    is sometimes seen in autistic people.

    2. Collision avoidance: Satellites and space agencies use various techniques to
    avoid collisions, such as predictive models to track potential collisions, propulsion
    systems to alter the satellite''s orbit, or just moving them out of harm''s way.


    3. Better satellite design: Some satellite manufacturers have started incorporating
    materials that can withstand collisions with space debris or designing satellites
